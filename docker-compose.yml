services:
  postgres:
    image: postgres:16-alpine
    container_name: freqtrade-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freqtrade_ai}
      POSTGRES_USER: ${POSTGRES_USER:-freqtrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freqtrade} -d ${POSTGRES_DB:-freqtrade_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
